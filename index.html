<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс лекций</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1 class="js-course-title">Курс лекций</h1>
        <p class="course-subtitle js-course-subtitle"></p>
        <nav class="course-links">
            <a href="https://1drv.ms/o/c/a78f46d739c0db14/IgDyJmm0KD_6Rb8SEPyyGZDWASgLwt_W8Lx5DruE-S7WqMY?e=Jhp8Wo" target="_blank" rel="noopener" class="course-link">
                OneNote
            </a>
            <a href="https://github.com/IlyaStepanov1104/Cource/tree/main/practice" class="course-link">
                GitHub
            </a>
        </nav>
    </header>

    <div class="js-lessons-container">
        <div class="loading">Загрузка занятий…</div>
    </div>
    
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('/lessons.json')
            .then(r => { if (!r.ok) throw new Error('network'); return r.json(); })
            .then(data => renderLessons(data))
            .catch((error) => {
                console.error('Error fetching lessons:', error);
                document.querySelector('.js-lessons-container').innerHTML =
                    '<div class="error">Не удалось загрузить данные</div>';
            });
    });

    function renderLessons(data) {
        const course = data.course || {};
        document.title = course.title || 'Курс лекций';
        document.querySelector('.js-course-title').textContent = course.title || 'Курс лекций';
        document.querySelector('.js-course-subtitle').textContent = course.subtitle || '';

        const root    = document.querySelector('.js-lessons-container');
        const lessons = data.lessons || [];

        if (lessons.length === 0) {
            root.innerHTML = '<div class="empty-state">Занятия ещё не добавлены</div>';
            return;
        }

        const now     = new Date();
        const viewAll = new URLSearchParams(window.location.search).get('view_all') === 'true';

        root.innerHTML = '';
        const list = document.createElement('div');
        list.className = 'lessons-list';

        const sorted = lessons.slice().sort((a, b) => (a.number || 0) - (b.number || 0));

        // разделяем на прошедшие и будущие (без даты = будущий)
        const past = [];
        const future = [];
        sorted.forEach(lesson => {
            const d = lesson.date ? new Date(lesson.date) : null;
            if (d && d <= now) past.push(lesson);
            else future.push(lesson);
        });

        // prepend прошедшие (кроме последних двух) в аккордеон "Прошедшие уроки"
        const KEEP_VISIBLE_PAST = 2;
        const hiddenPast  = viewAll ? [] : past.slice(0, Math.max(0, past.length - KEEP_VISIBLE_PAST));
        const visiblePast = viewAll ? past : past.slice(-KEEP_VISIBLE_PAST);

        if (hiddenPast.length > 0) {
            const details = document.createElement('details');
            details.className = 'past-spoiler';

            const summary = document.createElement('summary');
            const arrow = document.createElement('span');
            arrow.className = 'past-spoiler-arrow';
            arrow.textContent = '▶';
            const label = document.createElement('span');
            label.textContent = 'Прошедшие уроки';
            const count = document.createElement('span');
            count.className = 'past-spoiler-count';
            count.textContent = hiddenPast.length;
            summary.appendChild(arrow);
            summary.appendChild(label);
            summary.appendChild(count);
            details.appendChild(summary);

            const spoilerBody = document.createElement('div');
            spoilerBody.className = 'past-spoiler-body';
            hiddenPast.forEach(lesson => spoilerBody.appendChild(renderLessonCard(lesson, true, now)));
            details.appendChild(spoilerBody);
            list.appendChild(details);
        }

        visiblePast.forEach(lesson => list.appendChild(renderLessonCard(lesson, true, now)));

        // из будущих показываем первый как coming-soon, остальные скрываем (если не viewAll)
        future.forEach((lesson, idx) => {
            const isAvailable = !lesson.date || viewAll;
            if (!isAvailable && !viewAll && idx > 0) return;
            list.appendChild(renderLessonCard(lesson, isAvailable, now));
        });

        root.appendChild(list);
    }

    function renderLessonCard(lesson, isAvailable, now) {
        const lessonDate = lesson.date ? new Date(lesson.date) : null;

        const card = document.createElement('div');
        card.className = 'lesson-card' + (isAvailable ? '' : ' coming-soon-card');

        const header = document.createElement('div');
        header.className = 'lesson-header';

        const numEl = document.createElement('div');
        numEl.className = 'lesson-number';
        numEl.textContent = String(lesson.number ?? '?').padStart(2, '0');

        const meta = document.createElement('div');
        meta.className = 'lesson-meta';

        const titleEl = document.createElement('div');
        titleEl.className = 'lesson-title';
        titleEl.textContent = lesson.title || 'Без названия';

        if (lessonDate) {
            const dateEl = document.createElement('div');
            dateEl.className = 'lesson-date';
            dateEl.textContent = isAvailable
                ? formatDate(lessonDate)
                : 'Доступно с ' + formatDate(lessonDate);
            meta.appendChild(titleEl);
            meta.appendChild(dateEl);
        } else {
            meta.appendChild(titleEl);
        }

        header.appendChild(numEl);
        header.appendChild(meta);
        card.appendChild(header);

        const presentations = lesson.presentations || [];
        const homeworks     = lesson.homeworks || [];
        const body = document.createElement('div');
        body.className = 'lesson-body';

        const presSection = document.createElement('div');
        presSection.className = 'resource-section';

        if (presentations.length === 0) {
            const empty = document.createElement('span');
            empty.className = 'coming-soon-label';
            empty.textContent = 'Презентации появятся после занятия';
            presSection.appendChild(empty);
        } else {
            const ul = document.createElement('ul');
            ul.className = 'resource-list';
            presentations
                .slice().sort((a, b) => (a.order || 0) - (b.order || 0))
                .forEach(pres => {
                    const li = document.createElement('li');
                    const a  = document.createElement('a');
                    a.href = pres.link || '#';
                    if (/^https?:\/\//.test(pres.link || '')) { a.target = '_blank'; a.rel = 'noopener'; }

                    const chip = document.createElement('span');
                    chip.className = 'chip chip-blue';
                    chip.textContent = pres.order ?? '·';
                    a.appendChild(chip);
                    a.appendChild(document.createTextNode(' ' + (pres.title || 'Презентация')));
                    li.appendChild(a);
                    ul.appendChild(li);
                });
            presSection.appendChild(ul);
        }
        body.appendChild(presSection);

        if (homeworks.length > 0) {
            const details = document.createElement('details');
            details.className = 'hw-spoiler';

            const summary = document.createElement('summary');

            const arrow = document.createElement('span');
            arrow.className = 'hw-spoiler-arrow';
            arrow.textContent = '▶';

            const label = document.createElement('span');
            label.textContent = 'Домашние задания';

            const count = document.createElement('span');
            count.className = 'hw-spoiler-count';
            count.textContent = homeworks.length;

            summary.appendChild(arrow);
            summary.appendChild(label);
            summary.appendChild(count);
            details.appendChild(summary);

            const spoilerBody = document.createElement('div');
            spoilerBody.className = 'hw-spoiler-body';

            homeworks.forEach((hw, idx) => {
                const row = document.createElement('div');
                row.className = 'hw-row';

                const chip = document.createElement('span');
                chip.className = 'chip chip-green';
                chip.textContent = (idx + 1);

                const hwInner = document.createElement('div');
                hwInner.className = 'hw-inner';

                const titleEl = document.createElement('span');
                titleEl.className = 'hw-title';
                titleEl.textContent = hw.title || 'Задание';
                hwInner.appendChild(titleEl);

                if (hw.description) {
                    const descEl = document.createElement('span');
                    descEl.className = 'hw-desc';
                    descEl.textContent = hw.description;
                    hwInner.appendChild(descEl);
                }

                if (hw.link) {
                    const a = document.createElement('a');
                    a.href = hw.link;
                    if (/^https?:\/\//.test(hw.link)) { a.target = '_blank'; a.rel = 'noopener'; }
                    a.appendChild(chip);
                    a.appendChild(hwInner);
                    row.appendChild(a);
                } else {
                    const span = document.createElement('span');
                    span.className = 'hw-row-text';
                    span.appendChild(chip);
                    span.appendChild(hwInner);
                    row.appendChild(span);
                }

                if (hw.deadline) {
                    const dl   = new Date(hw.deadline);
                    const span = document.createElement('span');
                    span.className = 'hw-deadline' + deadlineClass(dl, now);
                    span.textContent = 'до ' + formatDate(dl);
                    row.appendChild(span);
                }
                spoilerBody.appendChild(row);
            });

            details.appendChild(spoilerBody);
            body.appendChild(details);
        }

        card.appendChild(body);
        return card;
    }

    function formatDate(d) {
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function deadlineClass(dl, now) {
        const diff = (dl - now) / 864e5;
        if (diff < 0) return ' overdue';
        if (diff < 3)  return ' soon';
        return '';
    }
</script>
</body>
</html>
